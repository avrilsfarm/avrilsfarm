<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#48997D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="에이브릴팜">
  <title>에이브릴팜 공방관리</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <!-- JSZip: docx 파일 파싱 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- JsBarcode: 바코드 생성 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .ti-loader { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>

<!-- 인트로 화면 -->
<div id="intro-screen" class="intro-screen">
  <div class="intro-inner">
    <div class="intro-logo-wrap">
      <span class="intro-leaf">🌿</span>
      <div class="intro-brand-name">AVRIL'S FARM</div>
      <div class="intro-brand-sub">100% Fresh Handmade Natural Soap</div>
    </div>
    <div class="intro-tagline">손바닥 위의 봄</div>
    <div class="intro-desc">
      사라지는 것들에 정성을 다하는 마음<br>
      공방 관리 시스템 · EF-MMS-001
    </div>
    <button class="intro-btn" onclick="startApp()">공방 관리 시작하기</button>
    <div class="intro-reg">
      화장품제조업 등록번호 제6494호 · 책임판매업 등록번호 제18216호<br>
      경기도 시흥시 진말1로 18, 에스엠타워 303호
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div class="app">
  <div class="topbar">
    <div class="topbar-logo" id="topbar-logo" title="처음으로">
      <span class="logo-leaf">🌿</span>
      <div>
        <div class="logo-text">AVRIL'S FARM</div>
        <div class="logo-sub">공방 관리 시스템</div>
      </div>
    </div>
    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab-btn" data-tab="stock">재료·재고</button>
        <button class="tab-btn" data-tab="manufacture">제품 제조</button>
        <button class="tab-btn" data-tab="mfcheck">제조 점검</button>
        <button class="tab-btn active" data-tab="hygiene">위생 점검<span id="badge-hygiene" class="tab-dot"></span></button>
        <button class="tab-btn" data-tab="production">생산실적</button>
        <button class="tab-btn" data-tab="output">문서 출력</button>
        <button class="tab-btn" data-tab="barcode">바코드</button>
        <button class="tab-btn" data-tab="notify">설정·알림</button>
      </div>
    </div>
  </div>
  <div id="page-content" style="display:none"></div>
</div>

<div id="sheet-overlay" class="hide" onclick="closeSheet()"></div>
<div id="sheet" class="hide"><div id="sheet-body"></div></div>

<script src="js/db.js"></script>
<script src="js/notify.js"></script>
<script src="js/pdf.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
</body>
</html>
