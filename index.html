<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#48997D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="에이브릴팜">
  <title>에이브릴팜 공방관리</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <!-- JSZip: docx 파일 파싱 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- JsBarcode: 바코드 생성 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-btn {
      background: none; border: none; color: var(--teal-dark); font-size: 24px;
      cursor: pointer; padding: 0 10px 0 0; display: flex; align-items: center;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div style="display:flex; align-items:center; width:100%; padding: 0 16px; box-sizing: border-box;">
      <!-- 왼쪽 뒤로가기 버튼 -->
      <button class="back-btn" onclick="history.back()" title="뒤로 가기">
        <i class="ti ti-arrow-left"></i>
      </button>
      
      <!-- 중앙 로고 영역 -->
      <div class="topbar-logo" style="margin-left:auto; margin-right:auto;">
        <span class="logo-leaf">🌿</span>
        <div>
          <div class="logo-text">AVRIL'S FARM</div>
          <div class="logo-sub">공방 관리 시스템</div>
        </div>
      </div>
      
      <!-- 대칭 맞춤용 투명 여백 -->
      <div style="width:24px;"></div> 
    </div>
    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab-btn" data-tab="stock">재고</button>
        <button class="tab-btn" data-tab="manufacture">제조</button>
        <button class="tab-btn" data-tab="mfcheck">점검</button>
        <button class="tab-btn active" data-tab="hygiene">위생 <span id="badge-hygiene" class="badge-dot" style="display:none"></span></button>
        <button class="tab-btn" data-tab="production">실적</button>
        <button class="tab-btn" data-tab="output">출력</button>
        <button class="tab-btn" data-tab="barcode">바코드</button>
        <button class="tab-btn" data-tab="notify" style="margin-left:auto; padding: 0 12px;"><i class="ti ti-settings" style="font-size:20px;"></i></button>
      </div>
    </div>
  </div>

  <div class="content" id="page-content">
    <!-- 자바스크립트를 통해 탭 내용이 렌더링됩니다 -->
  </div>
</div>

<!-- 하단 모달(바텀 시트) 영역 -->
<div id="sheet-overlay" class="sheet-overlay hide" onclick="closeSheet()"></div>
<div id="sheet" class="bottom-sheet hide">
  <div id="sheet-body"></div>
</div>

<!-- 스크립트 모듈 로드 -->
<script src="js/db.js"></script>
<script src="js/pdf.js"></script>
<script src="js/barcode.js"></script>
<script src="js/notify.js"></script>
<script src="js/app.js"></script>
</body>
</html>
